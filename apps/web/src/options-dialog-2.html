
        <div class="opt-block">
          <div class="opt-label" id="label-deciding">Deciding set</div>
          <div
            class="seg-row seg-row-wrap"
            role="radiogroup"
            aria-labelledby="label-deciding"
          >
            <label class="seg-item">
              <input
                class="seg-input"
                type="radio"
                name="deciding"
                value="full"
                checked
              />
              <span class="seg-text">Full set</span>
            </label>
            <label class="seg-item">
              <input
                class="seg-input"
                type="radio"
                name="deciding"
                value="matchTiebreak7"
              />
              <span class="seg-text">TB to 7</span>
            </label>
            <label class="seg-item">
              <input
                class="seg-input"
                type="radio"
                name="deciding"
                value="matchTiebreak10"
              />
              <span class="seg-text">TB to 10</span>
            </label>
          </div>
          <p class="hint hint-premium hint-tight">
            One-set + match TB starts in the tiebreak.
          </p>
        </div>

        <div class="opt-block">
          <div class="opt-label" id="label-golden">Golden point (deuce)</div>
          <div
            class="seg-row seg-row-2"
            role="radiogroup"
            aria-labelledby="label-golden"
          >
            <label class="seg-item">
              <input
                class="seg-input"
                type="radio"
                name="goldenPoint"
                value="off"
                checked
              />
              <span class="seg-text">Off</span>
            </label>
            <label class="seg-item">
              <input
                class="seg-input"
                type="radio"
                name="goldenPoint"
                value="on"
              />
              <span class="seg-text">On</span>
            </label>
          </div>
          <p class="hint hint-premium hint-tight">
            Next point wins at first 40–40 (no advantage).
          </p>
        </div>

        <div class="opt-block">
          <div class="opt-label" id="label-star-tb">Star point (3rd deuce)</div>
          <div
            class="seg-row seg-row-2"
            role="radiogroup"
            aria-labelledby="label-star-tb"
          >
            <label class="seg-item">
              <input
                class="seg-input"
                type="radio"
                name="starTiebreak"
                value="off"
                checked
              />
              <span class="seg-text">Off</span>
            </label>
            <label class="seg-item">
              <input
                class="seg-input"
                type="radio"
                name="starTiebreak"
                value="on"
              />
              <span class="seg-text">On</span>
            </label>
          </div>
          <p class="hint hint-premium hint-tight">
            After the 3rd return to 40–40, the next point wins the game. Off if
            golden deuce is on.
          </p>
        </div>

        <div class="opt-block">
          <div class="opt-label" id="label-serve">First server</div>
          <div
            class="seg-row seg-row-2"
            role="radiogroup"
            aria-labelledby="label-serve"
          >
            <label class="seg-item">
              <input
                class="seg-input"
                type="radio"
                name="serve"
                value="a"
                checked
              />
              <span class="seg-text">Side A</span>
            </label>
            <label class="seg-item">
              <input class="seg-input" type="radio" name="serve" value="b" />
              <span class="seg-text">Side B</span>
            </label>
          </div>
        </div>

        <div class="dlg-actions dlg-actions-sticky">
          <button type="button" class="btn-dlg-secondary" id="options-cancel">
            Cancel
          </button>
          <button type="button" class="btn-dlg-primary" id="options-save">
            Save
          </button>
        </div>
      </div>
    </dialog>
