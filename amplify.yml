version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build --workspace @brainstorm/web
  artifacts:
    baseDirectory: apps/web/dist
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
# HTML: revalidate always so clients pick up new chunk names; hashed JS/CSS: long cache.
customHeaders:
  - pattern: "**/*.html"
    headers:
      - key: Cache-Control
        value: public, max-age=0, must-revalidate
  - pattern: "**/*.js"
    headers:
      - key: Cache-Control
        value: public, max-age=31536000, immutable
  - pattern: "**/*.css"
    headers:
      - key: Cache-Control
        value: public, max-age=31536000, immutable
